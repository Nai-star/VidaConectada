services:
  - type: web
    name: vidaconectada-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn baseDatosVC.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vidaconectada-db
          property: connectionString

databases:
  - name: vidaconectada-db
    plan: free